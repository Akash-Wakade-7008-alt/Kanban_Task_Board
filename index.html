<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kanban Task Board</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
  
      <h1 class="text-center main-title">Kanban Task Board</h1>

      <div class="text-end mb-4">
        <button class="btn text-white" id="add-Btn">+ ADD TASK</button>
      </div>

      <!-- BOARD -->

      <div id="board">
        <div class="row g-4">
          <!-- PENDING -->

          <div class="col-lg-4">
            <div class="column-card">
              <h3 class="fw-bold text-center pending-title">🕒 Pending</h3>

              <div id="pending-column" data-status="Pending"></div>
            </div>
          </div>

          <!-- IN PROGRESS -->

          <div class="col-lg-4">
            <div class="column-card">
              <h3 class="fw-bold text-center progress-title">⚡ In Progress</h3>

              <div id="progress-column" data-status="In Progress"></div>
            </div>
          </div>

          <!-- COMPLETED -->

          <div class="col-lg-4">
            <div class="column-card">
              <h3 class="fw-bold text-center completed-title">✅ Completed</h3>

              <div id="completed-column" data-status="Completed"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- FORM -->


<div class="d-flex justify-content-center align-items-center">
      <form class="task-form-card border border-primary border-2 " id="form">
        <h3>Add New Task</h3>

        <div class="mb-4">
          <label class="form-label fw-semibold"> Task </label>

          <input
            type="text"
            class="form-control"
            placeholder="Enter your task..."
            id="input"
          />
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold"> Status </label>

          <select class="form-select" id="status">
            <option selected disabled>Select Status</option>
            <option>Pending</option>
            <option>In Progress</option>
            <option>Completed</option>
          </select>
        </div>

        <div class="d-flex gap-3">
          <button
            class="btn btn-primary custom-btn"
            id="addTaskBtn"
            type="submit"
          >
            ADD
          </button>

          <button
            class="btn btn-outline-primary custom-btn"
            id="cancelBtn"
            type="button"
          >
            CANCEL
          </button>
        </div>
      </form>
    </div>


</div>
<script src="./render.js"></script>
<script src="./addTask.js"></script>
<script src="./drag-drop.js"></script>
<script src="script.js"></script>



    <script src="./js/script.js"></script>
  </body>

</html>
