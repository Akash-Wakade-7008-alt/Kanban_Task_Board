<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Kanban Task Board</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet"
/>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="container py-5">

    <h1 class="text-center main-title">
        Kanban Task Board
    </h1>


    <div class="text-end mb-4">
        <button
            class="btn text-white"
            id="add-btn">
            + ADD TASK
        </button>
    </div>

    <!-- BOARD -->

    <div id="board">

        <div class="row g-4">

            <!-- PENDING -->

            <div class="col-lg-4">

                <div class="column-card">

                    <h3
                        class="fw-bold text-center pending-title">
                        🕒 Pending
                    </h3>

                    <div
                        id="pending-column"
                        data-status="Pending">
                    </div>

                </div>

            </div>

            <!-- IN PROGRESS -->

            <div class="col-lg-4">

                <div class="column-card">

                    <h3
                        class="fw-bold text-center progress-title">
                        ⚡ In Progress
                    </h3>

                    <div
                        id="progress-column"
                        data-status="In Progress">
                    </div>

                </div>

            </div>

            <!-- COMPLETED -->

            <div class="col-lg-4">

                <div class="column-card">

                    <h3
                        class="fw-bold text-center completed-title">
                        ✅ Completed
                    </h3>

                    <div
                        id="completed-column"
                        data-status="Completed">
                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- FORM -->


</div>
<script src="./render.js"></script>
<script src="./addTask.js"></script>
<script src="./drag-drop.js"></script>
<script src="script.js"></script>

</body>
</html>
